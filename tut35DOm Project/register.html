<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: rgb(89, 5, 108);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;


        }

        .parent {

            border: 2px solid red;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: auto;
            height: auto;
            padding: 10px;

        }

        form {
            display: flex;
            flex-direction: column;
            padding: 5px;
        }
        input{
            height: 40px;
            width: 300px;
            border: none ;
            padding: 5px;

        }
        button{
            padding: 10px;

        }
         a{
            text-decoration: none;
            color: rgb(80, 219, 15);
        }
    </style>
</head>

<body>
    <div class="parent">
        <h3>Already have an account <a href="login.html">Login</a></h3>

        <form action="" id="registerForm">
            <label for="">Enter your Email </label>
            <br>
            <input type="text" id="registerEmail" placeholder="enter your Email ">
            <br>
            <label for="">Enter your Password </label>
            <br>
            <input type="password" id="registerPassword" placeholder="enter your Password ">
            <br>


            <button type="submit">Register</button>
        </form>

    </div>


</body>
<script src="index.js"></script>


</html>
