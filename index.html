<!DOCTYPE html>
<html>
<head>
<style>
.box {
  width: 100px;
  height: 100px;
  background-color: red;
  animation: move 2s infinite;
}

@keyframes move {
  from {
   background-color: green;
   animation-timing-function: ease-in;
  }
  to {
   background-color: yellow;
  }
}
</style>
</head>

<body>
  <div class="box"></div>
</body>
</html>
